<aside class="sidebar">
  <div class="sidebar-block">
    <div class="sidebar-block-title">關於福伯</div>
    <div class="sidebar-block-body">
      <div class="about-avatar">🖊</div>
      <p class="about-text">本壇記錄作者多年來在台灣各地的自然觀察、植物探索，以及對時事與人文的感想筆記。</p>
      <p class="about-text" style="font-size:.8rem;color:var(--text3)">撰文期間：2019年至今 · 共 874 篇</p>
    </div>
  </div>

  <div class="sidebar-block">
    <div class="sidebar-block-title">近期文章</div>
    <div class="sidebar-block-body">
      <ul class="recent-list">
        {% assign recent = site.posts | limit: 7 %}
        {% for post in recent %}
        <li>
          <a href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}
            <span class="rdate">{{ post.date | date: "%Y/%m/%d" }}</span>
          </a>
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>

  <div class="sidebar-block">
    <div class="sidebar-block-title">文章分類</div>
    <div class="sidebar-block-body">
      <div class="tag-cloud">
        <span class="tag">植物觀察</span>
        <span class="tag">台灣自然</span>
        <span class="tag">時事評論</span>
        <span class="tag">人文歷史</span>
        <span class="tag">節氣隨筆</span>
        <span class="tag">台北植物園</span>
        <span class="tag">賞花記</span>
        <span class="tag">民俗文化</span>
      </div>
    </div>
  </div>
</aside>
