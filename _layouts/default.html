<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>
<body>
  {% include header.html %}
  {{ content }}
  {% include footer.html %}

  <!-- 手機側欄抽屜 -->
  <div class="mobile-overlay" id="mobileOverlay"></div>
  <div class="mobile-drawer" id="mobileDrawer">
    <div class="mobile-drawer-header">
      <span>選單</span>
      <button class="mobile-drawer-close" id="drawerClose" aria-label="關閉">✕</button>
    </div>
    <div class="mobile-drawer-body">
      {% include sidebar.html %}
    </div>
  </div>

  <script>
    (function(){
      var toggle  = document.getElementById('menuToggle');
      var overlay = document.getElementById('mobileOverlay');
      var drawer  = document.getElementById('mobileDrawer');
      var closeBtn= document.getElementById('drawerClose');
      function open(){
        overlay.classList.add('open');
        drawer.classList.add('open');
        document.body.style.overflow='hidden';
      }
      function close(){
        overlay.classList.remove('open');
        drawer.classList.remove('open');
        document.body.style.overflow='';
      }
      if(toggle)  toggle.addEventListener('click', open);
      if(overlay) overlay.addEventListener('click', close);
      if(closeBtn)closeBtn.addEventListener('click', close);
    })();
  </script>
</body>
</html>
