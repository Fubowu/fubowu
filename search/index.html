---
layout: default
title: 文章搜尋
---

<div class="main-wrap">
  <main>
    <div class="search-page-header">
      <h2 class="search-page-title">文章搜尋</h2>
      <form class="search-page-form" id="searchForm">
        <div class="search-input-wrap">
          <input class="search-input search-input-lg" type="text" id="searchInput"
                 placeholder="輸入關鍵字…" autocomplete="off">
          <button class="search-btn" type="submit">搜尋</button>
        </div>
      </form>
      <p class="search-hint" id="searchHint"></p>
    </div>

    <div id="searchResults" class="post-grid"></div>
    <p id="noResults" class="search-no-results" style="display:none">
      找不到符合「<span id="noResultsKw"></span>」的文章，請試試其他關鍵字。
    </p>
  </main>

  {% include sidebar.html %}
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lunr.js/2.3.9/lunr.min.js"></script>
<script>
const BASEURL = "{{ site.baseurl }}";

// 讀取搜尋索引
let searchIndex, postsData;

fetch(BASEURL + "/search.json")
  .then(r => r.json())
  .then(data => {
    postsData = data;

    // 建立 Lunr 索引（支援中文：以字元分割）
    searchIndex = lunr(function() {
      this.ref("url");
      this.field("title",   { boost: 10 });
      this.field("content", { boost: 1  });

      // 中文 tokenizer（以字元或標點切割）
      this.tokenizer = function(str) {
        if (!str || typeof str !== "string") return [];
        return str.replace(/\s+/g, "").split("").map(c => new lunr.Token(c));
      };

      data.forEach(doc => this.add(doc));
    });

    // 頁面載入時若 URL 有 ?q= 就直接搜尋
    const params = new URLSearchParams(window.location.search);
    const kw = params.get("q");
    if (kw) {
      document.getElementById("searchInput").value = kw;
      doSearch(kw);
    }
  });

document.getElementById("searchForm").addEventListener("submit", function(e) {
  e.preventDefault();
  const kw = document.getElementById("searchInput").value.trim();
  if (kw) {
    history.replaceState(null, "", "?q=" + encodeURIComponent(kw));
    doSearch(kw);
  }
});

document.getElementById("searchInput").addEventListener("input", function() {
  const kw = this.value.trim();
  if (kw.length >= 2) doSearch(kw);
  else if (kw.length === 0) clearResults();
});

function doSearch(kw) {
  if (!searchIndex) return;

  // 先試完整詞，再試單字元
  let results = [];
  try {
    results = searchIndex.search(kw + "~1");
  } catch(e) {}
  if (results.length === 0) {
    try { results = searchIndex.search(kw); } catch(e) {}
  }
  // 備用：直接字串比對
  if (results.length === 0) {
    results = postsData
      .filter(p => p.title.includes(kw) || p.content.includes(kw))
      .map(p => ({ ref: p.url }));
  }

  const hint = document.getElementById("searchHint");
  const grid = document.getElementById("searchResults");
  const none = document.getElementById("noResults");
  document.getElementById("noResultsKw").textContent = kw;

  if (results.length === 0) {
    grid.innerHTML = "";
    none.style.display = "block";
    hint.textContent = "";
    return;
  }

  none.style.display = "none";
  hint.textContent = `「${kw}」共找到 ${results.length} 篇文章`;

  const urlMap = {};
  postsData.forEach(p => urlMap[p.url] = p);

  grid.innerHTML = results.slice(0, 40).map(r => {
    const p = urlMap[r.ref];
    if (!p) return "";
    const hi = p.content.replace(
      new RegExp(kw.split("").join(".{0,2}"), "g"),
      m => `<mark>${m}</mark>`
    );
    return `
    <div class="post-card">
      <a href="${p.url}">
        <div class="post-card-body">
          <div class="post-card-date">📅 ${p.date} &nbsp;#${p.number}</div>
          <div class="post-card-title">${p.title.replace(new RegExp(kw,'g'), kw => '<mark>'+kw+'</mark>')}</div>
          <div class="post-card-summary">${hi.slice(0,120)}…</div>
          <span class="post-card-link">閱讀全文</span>
        </div>
      </a>
    </div>`;
  }).join("");
}

function clearResults() {
  document.getElementById("searchResults").innerHTML = "";
  document.getElementById("noResults").style.display = "none";
  document.getElementById("searchHint").textContent = "";
}
</script>
